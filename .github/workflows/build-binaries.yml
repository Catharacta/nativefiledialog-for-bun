# 各プラットフォーム向けのネイティブバイナリをビルドし、GitHub Release にアップロードするワークフロー。
name: Build Binaries

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            arch: x64
            artifact_name: nfd-win-x64.dll
          - os: macos-latest
            arch: x86_64
            artifact_name: nfd-mac-x64.dylib
          - os: macos-latest
            arch: arm64
            artifact_name: nfd-mac-arm64.dylib
          - os: ubuntu-latest
            arch: x64
            artifact_name: nfd-linux-x64.so

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev

      - name: Configure CMake
        shell: bash
        run: |
          cmake -B vendor/nfd-src/build -S vendor/nfd-src \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_BUILD_TYPE=Release \
            ${{ matrix.os == 'macos-latest' && format('-DCMAKE_OSX_ARCHITECTURES={0}', matrix.arch) || '' }}

      - name: Build
        shell: bash
        run: cmake --build vendor/nfd-src/build --config Release

      - name: Copy Binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: cp vendor/nfd-src/build/src/Release/nfd.dll ${{ matrix.artifact_name }}

      - name: Copy Binary (macOS/Linux)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          # The name might be libnfd.dylib or libnfd.so depending on build
          FILE=$(find vendor/nfd-src/build/src -name "libnfd.*" -o -name "nfd.*" | grep -E "\.(dylib|so)$" | head -n 1)
          cp "$FILE" ${{ matrix.artifact_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nfd-win-x64.dll
            nfd-mac-x64.dylib
            nfd-mac-arm64.dylib
            nfd-linux-x64.so
          generate_release_notes: true
