# タグが打たれたときに npm への自動公開（Trusted Publishing）を行うワークフロー。
name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      
      - name: Upgrade npm
        run: npm install -g npm@latest
      
      - name: Install dependencies
        run: bun install
      
      - name: Build
        run: bun run build
      
      - name: Publish to npm
        run: npm publish --provenance --access public
